<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lea's Daily Planner ✨</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons for aesthetic icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind Config for Custom Colors & Fonts -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                        signature: ['Caveat', 'cursive'],
                    },
                    colors: {
                        soft: {
                            pink: '#ffd1dc',
                            purple: '#e6e6fa',
                            blue: '#cae1ff',
                            green: '#c1e1c1',
                            yellow: '#fdfd96',
                            bg: '#f8f9fa'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        .task-item {
            transition: all 0.3s ease;
        }
        .task-item.completed {
            opacity: 0.6;
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-soft-pink via-soft-purple to-soft-blue min-h-screen flex items-center justify-center p-4 text-slate-700 antialiased selection:bg-pink-200">

    <!-- Main App Container -->
    <main class="glass max-w-md w-full rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] overflow-hidden flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <header class="p-8 pb-4 relative">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h2 id="greeting" class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">Selamat Pagi,</h2>
                    <h1 class="text-4xl font-signature text-pink-500 font-bold tracking-wide">Lea ✨</h1>
                </div>
                <div class="text-right bg-white/60 px-3 py-2 rounded-2xl shadow-sm border border-white/40">
                    <div id="clock" class="text-lg font-bold text-slate-700">00:00</div>
                    <div id="date" class="text-xs text-slate-500 font-medium">Senin, 1 Jan</div>
                </div>
            </div>
            <p class="text-sm text-slate-600 mt-2">Semoga harimu menyenangkan dan produktif! 🌸</p>
        </header>

        <!-- Input Section -->
        <section class="px-8 py-4">
            <form id="task-form" class="space-y-3">
                <div class="relative">
                    <input type="text" id="task-name" placeholder="Mau ngapain hari ini?" required
                        class="w-full bg-white/70 border border-white/50 text-slate-700 text-sm rounded-2xl px-4 py-3 pl-11 focus:outline-none focus:ring-2 focus:ring-pink-300 focus:bg-white transition-all shadow-sm placeholder-slate-400">
                    <i class="ph ph-sparkle absolute left-4 top-3.5 text-pink-400 text-lg"></i>
                </div>
                
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <input type="time" id="task-time" required
                            class="w-full bg-white/70 border border-white/50 text-slate-700 text-sm rounded-2xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-pink-300 focus:bg-white transition-all shadow-sm">
                    </div>
                    <div class="relative flex-1">
                        <select id="task-category" required
                            class="w-full bg-white/70 border border-white/50 text-slate-700 text-sm rounded-2xl px-4 py-2.5 appearance-none focus:outline-none focus:ring-2 focus:ring-pink-300 focus:bg-white transition-all shadow-sm cursor-pointer">
                            <option value="rutinitas">Rutinitas</option>
                            <option value="hobi">Hobi</option>
                            <option value="momen">Momen Spesial</option>
                            <option value="tugas">Tugas/Kerjaan</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-3.5 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
                
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 text-white font-semibold rounded-2xl py-3 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2">
                    <i class="ph ph-plus-circle text-xl"></i> Tambahkan
                </button>
            </form>
        </section>

        <!-- Filters -->
        <section class="px-8 py-2">
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="filter-container">
                <button class="filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-semibold transition-all bg-white shadow-sm text-pink-500 border border-pink-100" data-filter="all">Semua</button>
                <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium transition-all bg-white/50 text-slate-500 hover:bg-white" data-filter="rutinitas">Rutinitas</button>
                <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium transition-all bg-white/50 text-slate-500 hover:bg-white" data-filter="hobi">Hobi</button>
                <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium transition-all bg-white/50 text-slate-500 hover:bg-white" data-filter="momen">Momen Spesial</button>
            </div>
        </section>

        <!-- Task List -->
        <section class="px-6 pb-8 flex-1 overflow-y-auto">
            <div id="empty-state" class="hidden flex-col items-center justify-center text-center py-10 opacity-70">
                <img src="https://cdn-icons-png.flaticon.com/512/2666/2666436.png" alt="Empty" class="w-24 h-24 mb-4 drop-shadow-md">
                <p class="text-sm font-medium text-slate-500">Belum ada jadwal nih.<br>Yuk tambahin kegiatanmu!</p>
            </div>
            <ul id="task-list" class="space-y-3 mt-2">
                <!-- Tasks will be injected here by JS -->
            </ul>
        </section>

    </main>

    <script>
        // --- State Management ---
        let tasks = JSON.parse(localStorage.getItem('lea_tasks')) || [];
        let currentFilter = 'all';

        // --- DOM Elements ---
        const taskForm = document.getElementById('task-form');
        const taskNameInput = document.getElementById('task-name');
        const taskTimeInput = document.getElementById('task-time');
        const taskCategoryInput = document.getElementById('task-category');
        const taskList = document.getElementById('task-list');
        const emptyState = document.getElementById('empty-state');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // --- Category Styling Configurations ---
        const categoryConfig = {
            'rutinitas': { color: 'bg-soft-blue text-blue-600', icon: 'ph-arrows-clockwise' },
            'hobi':      { color: 'bg-soft-green text-green-700', icon: 'ph-palette' },
            'momen':     { color: 'bg-pink-100 text-pink-600', icon: 'ph-heart-straight' },
            'tugas':     { color: 'bg-orange-100 text-orange-600', icon: 'ph-briefcase' }
        };

        // --- Clock & Greeting Logic ---
        function updateTime() {
            const now = new Date();
            
            // Time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            
            // Date
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            document.getElementById('date').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

            // Greeting
            let greeting = 'Selamat Malam,';
            if (hours >= 5 && hours < 11) greeting = 'Selamat Pagi,';
            else if (hours >= 11 && hours < 15) greeting = 'Selamat Siang,';
            else if (hours >= 15 && hours < 18) greeting = 'Selamat Sore,';
            document.getElementById('greeting').textContent = greeting;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- Core Functions ---
        function saveTasks() {
            localStorage.setItem('lea_tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            taskList.innerHTML = '';
            
            // Sort tasks by time
            let filteredTasks = tasks.sort((a, b) => a.time.localeCompare(b.time));

            // Apply filter
            if (currentFilter !== 'all') {
                filteredTasks = filteredTasks.filter(task => task.category === currentFilter);
            }

            if (filteredTasks.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');

                filteredTasks.forEach((task, index) => {
                    const conf = categoryConfig[task.category];
                    const li = document.createElement('li');
                    li.className = `task-item bg-white/80 border border-white shadow-sm rounded-2xl p-4 flex items-center justify-between animate-fade-in ${task.completed ? 'completed' : ''}`;
                    li.style.animationDelay = `${index * 0.05}s`;

                    li.innerHTML = `
                        <div class="flex items-center gap-4 flex-1 overflow-hidden">
                            <button onclick="toggleTask(${task.id})" class="flex-shrink-0 w-6 h-6 rounded-full border-2 ${task.completed ? 'border-pink-400 bg-pink-400 text-white' : 'border-slate-300 hover:border-pink-300'} flex items-center justify-center transition-colors">
                                ${task.completed ? '<i class="ph ph-check text-xs"></i>' : ''}
                            </button>
                            <div class="flex flex-col flex-1 min-w-0">
                                <h3 class="font-semibold text-slate-700 truncate ${task.completed ? 'line-through text-slate-400' : ''}">${task.name}</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-md ${conf.color}">
                                        <i class="ph ${conf.icon}"></i>
                                        <span class="capitalize">${task.category === 'momen' ? 'Momen Spesial' : task.category}</span>
                                    </span>
                                    <span class="text-xs text-slate-400 flex items-center gap-1 font-medium">
                                        <i class="ph ph-clock"></i> ${task.time}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <button onclick="deleteTask(${task.id})" class="text-slate-300 hover:text-red-400 transition-colors p-2 rounded-full hover:bg-red-50 ml-2">
                            <i class="ph ph-trash text-lg"></i>
                        </button>
                    `;
                    taskList.appendChild(li);
                });
            }
        }

        // --- Event Handlers ---
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newTask = {
                id: Date.now(),
                name: taskNameInput.value,
                time: taskTimeInput.value,
                category: taskCategoryInput.value,
                completed: false
            };

            tasks.push(newTask);
            saveTasks();
            renderTasks();

            // Reset form
            taskNameInput.value = '';
            taskTimeInput.value = '';
            // Don't reset category, user might want to add multiple of same category
        });

        window.toggleTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                
                // Little celebration if done and it's a special moment
                if(task.completed && task.category === 'momen') {
                    createSparkles();
                }
            }
        }

        window.deleteTask = function(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        // Filter functionality
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active state styling
                filterBtns.forEach(b => {
                    b.classList.remove('text-pink-500', 'border-pink-100', 'shadow-sm', 'font-semibold');
                    b.classList.add('text-slate-500', 'bg-white/50', 'font-medium');
                    b.style.backgroundColor = ''; 
                });
                
                btn.classList.remove('text-slate-500', 'bg-white/50', 'font-medium');
                btn.classList.add('text-pink-500', 'bg-white', 'shadow-sm', 'border', 'border-pink-100', 'font-semibold');

                currentFilter = btn.getAttribute('data-filter');
                renderTasks();
            });
        });

        // Simple aesthetic particle effect
        function createSparkles() {
            for(let i=0; i<10; i++) {
                const sparkle = document.createElement('div');
                sparkle.innerHTML = '✨';
                sparkle.style.position = 'fixed';
                sparkle.style.left = Math.random() * window.innerWidth + 'px';
                sparkle.style.top = Math.random() * window.innerHeight + 'px';
                sparkle.style.fontSize = (Math.random() * 20 + 10) + 'px';
                sparkle.style.animation = 'fadeIn 1s ease-out reverse forwards';
                sparkle.style.zIndex = '9999';
                sparkle.style.pointerEvents = 'none';
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        // Initial Render
        renderTasks();

    </script>
</body>
</html>
